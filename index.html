<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh sách khách gửi session</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f4f6fb;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.table-wrap{
  overflow:auto;
  background:#fff;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1000px;
}

th, td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:left;
}

th{
  background:#f9fafb;
  position:sticky;
  top:0;
}

.code{
  background:#111827;
  color:#e5e7eb;
  padding:10px;
  border-radius:8px;
  font-size:12px;
  max-height:200px;
  overflow:auto;
  white-space:pre-wrap;
}

.copy-btn{
  width:100%;
  height:50px;
  font-size:18px;
  font-weight:bold;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
  cursor:pointer;
}

.copy-btn:hover{
  background:#333;
}

.status{
  margin-bottom:10px;
}
</style>
</head>

<body>
<div class="container">
  <h1>Danh sách khách gửi session</h1>
  <div id="status" class="status">Đang tải...</div>

  <div id="table"></div>
</div>

<script>
const SHEET_ID = "1Bvg3Sews-W1881wuI3SMPqtxP2elIWVNX9Z6gUJYxqs";
const SHEET_GID = "312835306";

function getUrl(){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${SHEET_GID}&tqx=out:json`;
}

function copyText(text,btn){
  navigator.clipboard.writeText(text);
  btn.innerText = "Đã copy";
  setTimeout(()=>btn.innerText="COPY",1500);
}

function escapeHtml(text){
  return String(text)
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;');
}

async function load(){
  try{
    const res = await fetch(getUrl());
    const text = await res.text();
    const json = JSON.parse(text.match(/\((.*)\)/s)[1]);

    const rows = json.table.rows;
    const cols = json.table.cols.map(c=>c.label);

    const data = rows.map(r=>{
      return r.c.map(c=>c?c.v:'');
    });

    data.reverse();

    document.getElementById("status").innerText = "Tổng: "+data.length+" khách";

    let html = `<div class="table-wrap"><table><thead><tr>`;

    cols.forEach(c=> html+=`<th>${c}</th>`);
    html += `<th>Copy</th></tr></thead><tbody>`;

    data.forEach((row,i)=>{
      html += "<tr>";

      row.forEach((cell,index)=>{
        if(index===row.length-1){
          html += `<td><div class="code">${escapeHtml(cell)}</div></td>`;
        }else{
          html += `<td>${cell||''}</td>`;
        }
      });

      html += `<td><button class="copy-btn" onclick="copyText(\`${row[row.length-1]||''}\`,this)">COPY</button></td>`;

      html += "</tr>";
    });

    html += "</tbody></table></div>";

    document.getElementById("table").innerHTML = html;

  }catch(e){
    document.getElementById("status").innerText = "Lỗi load dữ liệu";
  }
}

load();
</script>

</body>
</html>
