<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh sách session</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6fb}
.container{max-width:900px;margin:auto;padding:12px}
h1{text-align:center}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.search{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-right:8px;
}

.ctrlz{
font-size:12px;
padding:6px 10px;
background:#111;
color:#fff;
border-radius:8px;
cursor:pointer;
}

.reload{
position:fixed;
top:10px;
right:10px;
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#111;
color:#fff;
font-size:18px;
cursor:pointer;
}

.card{
background:#fff;
border-radius:14px;
padding:12px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.row{display:flex;gap:10px}

.left{width:100px}

.btn{
width:100%;
height:50px;
border:none;
border-radius:10px;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.copy{background:#000}
.del{background:#dc2626;margin-top:6px}

.preview{
background:#111;
color:#fff;
padding:10px;
border-radius:10px;
font-size:12px;
margin-top:6px;
}

.ok{color:#16a34a;font-weight:bold}
.bad{color:#dc2626;font-weight:bold}

</style>
</head>

<body>

<button class="reload" onclick="load()">↻</button>

<div class="container">
<h1>Danh sách khách</h1>

<div class="top">
<input id="search" class="search" placeholder="Tìm email..." oninput="render()">
<div class="ctrlz" onclick="undo()">Ctrl Z</div>
</div>

<div id="status"></div>
<div id="list"></div>
</div>

<script>
const ID="1Bvg3Sews-W1881wuI3SMPqtxP2elIWVNX9Z6gUJYxqs";
const GID="312835306";

let data=[],lastDeleted=null;

function url(){
return `https://docs.google.com/spreadsheets/d/${ID}/gviz/tq?gid=${GID}&tqx=out:json`;
}

function preview(s){
s=String(s||'').replace(/\s+/g,' ').trim();
if(!s)return "Không có session";
if(s.length<40)return s;
return s.slice(0,12)+"..."+s.slice(-12);
}

function getEmails(s){
return (s.toLowerCase().match(/[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/g)||[]);
}

function check(mail,session){
mail=mail.toLowerCase().trim();
const e=getEmails(session);
return e.includes(mail);
}

function render(){
const q=document.getElementById("search").value.toLowerCase();
const list=document.getElementById("list");
list.innerHTML="";
let count=0;

data.forEach((x,i)=>{
if(x.hidden)return;
if(q && !x.email.toLowerCase().includes(q))return;

count++;

let checkText="";
if(i<5){
checkText = check(x.email,x.session)
? '<span class="ok">Khớp email</span>'
: '<span class="bad">Sai email</span>';
}

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="row">
<div class="left">
<button class="btn copy">COPY</button>
<button class="btn del">DELETE</button>
</div>
<div style="flex:1">
<div><b>${x.time}</b></div>
<div>${x.email}</div>
<div>${x.social}</div>
<div>${checkText}</div>
<div class="preview">${preview(x.session)}</div>
</div>
</div>
`;

card.querySelector(".copy").onclick=()=>{
navigator.clipboard.writeText(x.session);
};

card.querySelector(".del").onclick=()=>{
x.hidden=true;
lastDeleted=x;
render();
};

list.appendChild(card);
});

document.getElementById("status").innerText="Tổng: "+count;
}

async function load(){
const r=await fetch(url());
const t=await r.text();
const j=JSON.parse(t.match(/setResponse\((.*)\)/s)[1]);

data=j.table.rows.map(r=>{
const c=r.c||[];
return{
time:c[0]?.f||c[0]?.v||'',
email:c[1]?.v||'',
social:c[2]?.v||'',
session:c[3]?.v||'',
hidden:false
};
}).reverse();

render();
}

function undo(){
if(lastDeleted){
lastDeleted.hidden=false;
lastDeleted=null;
render();
}
}

load();
</script>

</body>
</html>
