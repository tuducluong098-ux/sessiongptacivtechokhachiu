<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danh sách code khách gửi 1</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }
    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 24px;
      margin: 0;
      width: 100%;
    }
    .input, .btn {
      border-radius: 12px;
      border: 1px solid #d1d5db;
      background: #fff;
      min-height: 44px;
      font-size: 15px;
    }
    .input {
      flex: 1 1 260px;
      padding: 10px 14px;
    }
    .btn {
      padding: 0 16px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:hover { background: #f3f4f6; }
    .status {
      margin: 8px 0 16px;
      font-size: 14px;
      color: #6b7280;
    }
    .list {
      display: grid;
      gap: 14px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    }
    .meta {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .label {
      color: #6b7280;
      font-weight: 600;
      margin-right: 6px;
    }
    .content {
      background: #0f172a;
      color: #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
      line-height: 1.45;
      max-height: 260px;
      overflow: auto;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .copy-btn {
      background: #111827;
      color: #fff;
      border: none;
    }
    .copy-btn:hover { background: #000; }
    .muted-btn {
      background: #fff;
    }
    .empty {
      text-align: center;
      color: #6b7280;
      padding: 32px 12px;
      background: #fff;
      border: 1px dashed #d1d5db;
      border-radius: 16px;
    }
    .small {
      font-size: 12px;
      color: #6b7280;
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Danh sách code khách gửi</h1>
      <input id="searchInput" class="input" type="text" placeholder="Tìm theo email / Facebook / Zalo" />
      <button id="reloadBtn" class="btn">Tải lại</button>
    </div>

    <div id="status" class="status">Đang tải dữ liệu...</div>
    <div id="list" class="list"></div>

    <div class="small">
      Gợi ý: Web này chỉ để bạn xem và bấm copy 1 cái. Để dùng được, bạn cần dán link sheet ở phần cấu hình trong file này.
    </div>
  </div>

  <script>
    /**
     * ==========================
     * CẤU HÌNH DUY NHẤT CẦN SỬA
     * ==========================
     * Dán SHEET_ID và SHEET_GID của bạn vào đây.
     *
     * Ví dụ link sheet:
     * https://docs.google.com/spreadsheets/d/1AbCdEfGhIjKlMnOpQrStuVwXyZ1234567890/edit#gid=0
     *
     * SHEET_ID = 1AbCdEfGhIjKlMnOpQrStuVwXyZ1234567890
     * SHEET_GID = 0
     */
    const SHEET_ID = "1Bvg3Sews-W1881wuI3SMPqtxP2elIWVNX9Z6gUJYxqs";
    const SHEET_GID = "0";

    // Tên cột dự kiến từ Google Form đổ về Sheet
    const COLUMN_MAP = {
      timestamp: ["Dấu thời gian", "Timestamp"],
      email: ["Địa chỉ email (để shop liên hệ)", "Địa chỉ email acc chatgpt", "Email"],
      social: ["tên facebook hoặc zalo mà bạn đang dùng để nhắn tin với shop ( để shop quản lí tránh nhầm lẫn ạ)", "Tên Facebook/Zalo", "Facebook/Zalo"],
      content: ["Đoạn code seesion phiên đăng nhập mà bạn thao tác như video. lưu ý: copy hết từ trên xuống dưới warning banner.. đến ..false}}}", "Nội dung", "Code", "Đoạn code"]
    };

    const listEl = document.getElementById('list');
    const statusEl = document.getElementById('status');
    const searchInput = document.getElementById('searchInput');
    const reloadBtn = document.getElementById('reloadBtn');

    let allRows = [];

    function getGvizUrl() {
      return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${SHEET_GID}&tqx=out:json`;
    }

    function normalizeText(value) {
      return String(value || '').trim().toLowerCase();
    }

    function getCellValue(cell) {
      if (!cell) return '';
      if (cell.f) return cell.f;
      if (cell.v === null || cell.v === undefined) return '';
      return String(cell.v);
    }

    function findColumnIndex(labels, candidates) {
      const normalizedLabels = labels.map(normalizeText);
      for (const name of candidates) {
        const idx = normalizedLabels.indexOf(normalizeText(name));
        if (idx !== -1) return idx;
      }
      return -1;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function copyText(text, button) {
      try {
        await navigator.clipboard.writeText(text);
        const original = button.textContent;
        button.textContent = 'Đã copy';
        setTimeout(() => {
          button.textContent = original;
        }, 1500);
      } catch (err) {
        alert('Copy lỗi. Thử mở bằng Chrome hoặc Safari mới hơn.');
      }
    }

    function render(rows) {
      const keyword = normalizeText(searchInput.value);
      const filtered = rows.filter(row => {
        if (!keyword) return true;
        return [row.email, row.social, row.content, row.timestamp]
          .some(v => normalizeText(v).includes(keyword));
      });

      statusEl.textContent = `Tổng ${filtered.length} mục${keyword ? ` / ${rows.length} toàn bộ` : ''}`;

      if (!filtered.length) {
        listEl.innerHTML = '<div class="empty">Không có dữ liệu phù hợp.</div>';
        return;
      }

      listEl.innerHTML = filtered.map((row, index) => `
        <div class="card">
          <div class="meta">
            <div><span class="label">STT:</span> ${index + 1}</div>
            <div><span class="label">Thời gian:</span> ${escapeHtml(row.timestamp || '')}</div>
            <div><span class="label">Email:</span> ${escapeHtml(row.email || '')}</div>
            <div><span class="label">FB/Zalo:</span> ${escapeHtml(row.social || '')}</div>
          </div>
          <div class="content">${escapeHtml(row.content || '')}</div>
          <div class="actions">
            <button class="btn copy-btn" data-copy="${index}">Copy nội dung</button>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', () => {
          const row = filtered[Number(btn.dataset.copy)];
          copyText(row.content || '', btn);
        });
      });
    }

    async function loadData() {
      if (SHEET_ID === 'DAN_SHEET_ID_CUA_BAN_VAO_DAY') {
        statusEl.textContent = 'Bạn chưa dán SHEET_ID vào file.';
        listEl.innerHTML = '<div class="empty">Mở file index.html và dán SHEET_ID của Google Sheet vào phần cấu hình.</div>';
        return;
      }

      statusEl.textContent = 'Đang tải dữ liệu...';
      listEl.innerHTML = '';

      try {
        const response = await fetch(getGvizUrl());
        const text = await response.text();
        const jsonText = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/s)?.[1];

        if (!jsonText) {
          throw new Error('Không đọc được dữ liệu từ Google Sheet.');
        }

        const data = JSON.parse(jsonText);
        const labels = data.table.cols.map(col => col.label || '');
        const rows = data.table.rows || [];

        const timestampIndex = findColumnIndex(labels, COLUMN_MAP.timestamp);
        const emailIndex = findColumnIndex(labels, COLUMN_MAP.email);
        const socialIndex = findColumnIndex(labels, COLUMN_MAP.social);
        const contentIndex = findColumnIndex(labels, COLUMN_MAP.content);

        allRows = rows.map(row => {
          const cells = row.c || [];
          return {
            timestamp: getCellValue(cells[timestampIndex]),
            email: getCellValue(cells[emailIndex]),
            social: getCellValue(cells[socialIndex]),
            content: getCellValue(cells[contentIndex])
          };
        }).filter(item => item.content);

        allRows.reverse();
        render(allRows);
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Tải dữ liệu thất bại.';
        listEl.innerHTML = '<div class="empty">Lỗi tải dữ liệu. Kiểm tra xem Sheet đã chia sẻ đúng chưa và SHEET_ID/GID đã dán đúng chưa.</div>';
      }
    }

    searchInput.addEventListener('input', () => render(allRows));
    reloadBtn.addEventListener('click', loadData);

    loadData();
  </script>
</body>
</html>
