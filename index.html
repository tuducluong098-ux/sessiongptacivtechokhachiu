<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh sách khách gửi session</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6fb;color:#111}
.container{max-width:900px;margin:auto;padding:12px}
h1{text-align:center;margin:0 0 14px;font-size:22px}
.status{margin-bottom:10px;font-size:14px;color:#555}
.top-actions{display:flex;justify-content:flex-end;margin-bottom:10px}
.small-btn{border:none;border-radius:10px;background:#111;color:#fff;padding:8px 12px;font-weight:700}
.card{background:#fff;border-radius:14px;padding:12px;box-shadow:0 4px 10px rgba(0,0,0,0.05);margin-bottom:12px}
.row{display:flex;gap:10px}
.copy-wrap{width:100px}
.copy-btn,.delete-btn{width:100%;height:55px;border:none;border-radius:12px;font-weight:bold;color:#fff}
.copy-btn{background:#000}
.delete-btn{background:#dc2626;margin-top:6px}
.meta{font-size:14px;margin-bottom:6px}
.label{color:#777;font-weight:700}
.preview{background:#0b1530;color:#fff;padding:10px;border-radius:12px;font-size:12px}
.refresh-btn{position:fixed;top:12px;right:12px;width:40px;height:40px;border-radius:50%;border:none;background:#111;color:#fff}
</style>
</head>

<body>

<button class="refresh-btn" onclick="load()">↻</button>

<div class="container">
<h1>Danh sách khách gửi session</h1>

<div class="top-actions">
<button class="small-btn" onclick="localStorage.clear();load()">Hiện lại mục đã xoá</button>
</div>

<div id="status">Đang tải...</div>
<div id="table"></div>
</div>

<script>
const SHEET_ID="1Bvg3Sews-W1881wuI3SMPqtxP2elIWVNX9Z6gUJYxqs";
const GID="312835306";

function getUrl(){
return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID}&tqx=out:json`;
}

function escapeHtml(s){
return String(s||'')
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

function previewText(s){
s=String(s||'').replace(/\s+/g,' ').trim();
if(!s)return "Không có session";
if(s.length<40)return s;
return s.slice(0,15)+"..."+s.slice(-15);
}

async function copyText(text,btn){
await navigator.clipboard.writeText(text||'');
btn.innerText="Đã copy";
setTimeout(()=>btn.innerText="COPY",1200);
}

async function load(){
try{
const res=await fetch(getUrl());
const txt=await res.text();
const json=JSON.parse(txt.match(/setResponse\((.*)\)/s)[1]);

const rows=json.table.rows||[];
const table=document.getElementById("table");
table.innerHTML="";

let count=0;

rows.reverse().forEach(r=>{
const c=r.c||[];

const time=c[0]?.f||c[0]?.v||'';
const email=c[1]?.v||'';
const social=c[2]?.v||'';
const session=c[3]?.v||''; // 🔥 FIX QUAN TRỌNG

const key=time+email+social+session;
if(localStorage.getItem(key))return;

count++;

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="row">
<div class="copy-wrap">
<button class="copy-btn">COPY</button>
<button class="delete-btn">DELETE</button>
</div>
<div style="flex:1">
<div class="meta"><span class="label">Thời gian:</span> ${escapeHtml(time)}</div>
<div class="meta"><span class="label">Email:</span> ${escapeHtml(email)}</div>
<div class="meta"><span class="label">FB/Zalo:</span> ${escapeHtml(social)}</div>
<div class="meta"><span class="label">Session:</span></div>
<div class="preview">${escapeHtml(previewText(session))}</div>
</div>
</div>`;

const copyBtn=card.querySelector(".copy-btn");
copyBtn.onclick=()=>copyText(session,copyBtn);

const delBtn=card.querySelector(".delete-btn");
delBtn.onclick=()=>{
localStorage.setItem(key,1);
card.remove();
};

table.appendChild(card);
});

document.getElementById("status").innerText=`Tổng: ${count} khách`;

}catch{
document.getElementById("status").innerText="Lỗi load dữ liệu";
}
}

load();
</script>

</body>
</html>
