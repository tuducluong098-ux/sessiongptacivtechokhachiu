<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh sách session</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6fb}
.container{max-width:900px;margin:auto;padding:12px}
h1{text-align:center}

.top{display:flex;gap:8px;margin-bottom:10px}
.search{flex:1;padding:10px;border-radius:10px;border:1px solid #ccc}
.ctrlz{padding:6px 10px;background:#111;color:#fff;border-radius:8px;font-size:12px;cursor:pointer}

.reload{
position:fixed;top:10px;right:10px;
width:40px;height:40px;border-radius:50%;
border:none;background:#111;color:#fff;font-size:18px;cursor:pointer;
}

.card{background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 4px 10px rgba(0,0,0,0.05)}
.row{display:flex;gap:10px}
.left{width:100px}

.btn{width:100%;height:50px;border:none;border-radius:10px;color:#fff;font-weight:bold;cursor:pointer}
.copy{background:#000}
.del{background:#dc2626;margin-top:6px}

.preview{background:#111;color:#fff;padding:10px;border-radius:10px;font-size:12px;margin-top:6px}

.ok{color:#16a34a;font-weight:bold}
.bad{color:#dc2626;font-weight:bold}

/* popup */
.popup{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center}
.box{background:#fff;padding:16px;border-radius:12px;max-width:360px;width:100%}
.popup-btn{margin-top:10px;width:100%;padding:10px;border:none;border-radius:10px;background:#111;color:#fff}
.red{color:#dc2626;font-weight:bold}
</style>
</head>

<body>

<button class="reload" onclick="reloadPage()">↻</button>

<div class="container">
<h1>Danh sách khách</h1>

<div class="top">
<input id="search" class="search" placeholder="Tìm email..." oninput="render()">
<div class="ctrlz" onclick="undo()">Ctrl Z</div>
</div>

<div id="status"></div>
<div id="list"></div>
</div>

<!-- popup -->
<div id="popup" class="popup">
<div class="box">
<div id="popupText"></div>
<button class="popup-btn" onclick="closePopup()">Huỷ</button>
</div>
</div>

<script>
const ID="1Bvg3Sews-W1881wuI3SMPqtxP2elIWVNX9Z6gUJYxqs";
const GID="312835306";

let data=[],lastDeleted=null,deleteTarget=null;

function url(){
return `https://docs.google.com/spreadsheets/d/${ID}/gviz/tq?gid=${GID}&tqx=out:json`;
}

function preview(s){
s=String(s||'').replace(/\s+/g,' ').trim();
if(!s)return "Không có session";
if(s.length<40)return s;
return s.slice(0,12)+"..."+s.slice(-12);
}

function emails(s){
return (s.toLowerCase().match(/[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/g)||[]);
}

function check(mail,session){
mail=mail.toLowerCase().trim();
const e=emails(session);
return e.includes(mail);
}

function showPopup(html){
document.getElementById("popupText").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function reloadPage(){
location.reload(); // FIX RELOAD
}

function render(){
const q=document.getElementById("search").value.toLowerCase();
const list=document.getElementById("list");
list.innerHTML="";
let count=0;

data.forEach((x,i)=>{
if(x.hidden)return;
if(q && !x.email.toLowerCase().includes(q))return;

count++;

let isMatch = check(x.email,x.session);

let checkText="";
if(i<5){
checkText = isMatch
? '<span class="ok">Khớp email</span>'
: '<span class="bad">Sai email</span>';
}

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="row">
<div class="left">
<button class="btn copy">COPY</button>
<button class="btn del">DELETE</button>
</div>
<div style="flex:1">
<div><b>${x.time}</b></div>
<div>${x.email}</div>
<div>${x.social}</div>
<div>${checkText}</div>
<div class="preview">${preview(x.session)}</div>
</div>
</div>
`;

card.querySelector(".copy").onclick=()=>{
if(isMatch){
showPopup(`Đã copy session của email <b>${x.email}</b>`);
}else{
showPopup(`Vui lòng xem lại, email <span class="red">KHÔNG khớp</span>`);
}
navigator.clipboard.writeText(x.session);
};

card.querySelector(".del").onclick=()=>{
deleteTarget=x;
showPopup(`
Bạn có chắc muốn xoá?<br><br>
<button class="popup-btn" onclick="confirmDelete()">Xoá</button>
`);
};

list.appendChild(card);
});

document.getElementById("status").innerText="Tổng: "+count;
}

function confirmDelete(){
if(deleteTarget){
deleteTarget.hidden=true;
lastDeleted=deleteTarget;
deleteTarget=null;
closePopup();
render();
}
}

function undo(){
if(lastDeleted){
lastDeleted.hidden=false;
lastDeleted=null;
render();
}
}

async function load(){
const r=await fetch(url());
const t=await r.text();
const j=JSON.parse(t.match(/setResponse\((.*)\)/s)[1]);

data=j.table.rows.map(r=>{
const c=r.c||[];
return{
time:c[0]?.f||c[0]?.v||'',
email:c[1]?.v||'',
social:c[2]?.v||'',
session:c[3]?.v||'',
hidden:false
};
}).reverse();

render();
}

load();
</script>

</body>
</html>
